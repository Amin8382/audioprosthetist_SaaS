server:
  port: 8081

spring:
  application:
    name: audiosoin
  datasource:
    url: jdbc:postgresql://localhost:5444/audiosoin
    username: audiosoin
    password: audiosoin123
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  redis:
    host: localhost
    port: 6380
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production-min-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:8000}
    connect-timeout: 10000
    read-timeout: 30000
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
  storage:
    path: ${STORAGE_PATH:./uploads}

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui.html

logging:
  level:
    com.audiosoin: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5433/audiosoin
    username: audiosoin
    password: audiosoin123
  redis:
    host: redis
    port: 6379
  jpa:
    show-sql: false

app:
  ai:
    service-url: http://ai-service:8000
  frontend:
    url: http://localhost:3000
  jwt:
    secret: ${JWT_SECRET:docker-jwt-secret-key-change-in-production}
