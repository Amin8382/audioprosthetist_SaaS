version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: audiosoin-postgres
    environment:
      POSTGRES_DB: audiosoin
      POSTGRES_USER: audiosoin
      POSTGRES_PASSWORD: audiosoin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    ports:
      - "5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiosoin -d audiosoin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: audiosoin-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audiosoin-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/audiosoin
      SPRING_DATASOURCE_USERNAME: audiosoin
      SPRING_DATASOURCE_PASSWORD: audiosoin123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6380
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production-min-256-bits}
      JWT_EXPIRATION_MS: 900000
      JWT_REFRESH_EXPIRATION_MS: 604800000
      FRONTEND_URL: http://localhost:3000
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 10MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 10MB
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: audiosoin-ai
    environment:
      REDIS_URL: redis://redis:6379/0
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      POSTGRES_URL: postgresql://audiosoin:audiosoin123@postgres:5432/audiosoin
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./ai-service/models:/app/models
      - ./backend/uploads:/app/uploads

  celery-worker:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: audiosoin-celery
    command: celery -A tasks worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql://audiosoin:audiosoin123@postgres:5432/audiosoin
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - ./ai-service/models:/app/models
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audiosoin-frontend
    environment:
      VITE_API_URL: http://localhost:8080/api
      VITE_AI_SERVICE_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: